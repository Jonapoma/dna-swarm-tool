services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: genomicswarm-backend
    env_file: .env
    ports:
      - "5001:5001"
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: genomicswarm-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
